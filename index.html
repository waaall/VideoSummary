<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>VideoSummary - 智能视频摘要</title>
    <!-- 预加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- 主题初始化脚本：防止闪烁 -->
    <script>
      (function() {
        const nsRaw = '%VITE_STORAGE_NS%';
        const storageNamespace = nsRaw && !nsRaw.includes('VITE_STORAGE_NS')
          ? nsRaw
          : 'video';
        const settingsKey = storageNamespace + ':video-summary-settings';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let themeMode = 'system';

        try {
          const stored = localStorage.getItem(settingsKey);
          if (stored) {
            const parsed = JSON.parse(stored);
            const candidate = parsed && parsed.state && parsed.state.themeMode;
            if (candidate === 'light' || candidate === 'dark' || candidate === 'system') {
              themeMode = candidate;
            }
          }
        } catch {
          themeMode = 'system';
        }

        const theme = themeMode === 'system'
          ? (prefersDark ? 'dark' : 'light')
          : themeMode;
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="%BASE_URL%src/main.tsx"></script>
  </body>
</html>
